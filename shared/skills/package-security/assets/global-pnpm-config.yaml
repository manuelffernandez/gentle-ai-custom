# Global pnpm baseline
# Put this at ~/.config/pnpm/config.yaml
#
# Keep project-specific `allowBuilds` in the repo, not here.
# Unlike npm, pnpm has a reviewed allowlist model for dependency build scripts.
# Prefer `allowBuilds` + `strictDepBuilds` in project config over a blanket
# `ignore-scripts` approach.

minimumReleaseAge: 4320
trustPolicy: no-downgrade
blockExoticSubdeps: true
saveExact: true
